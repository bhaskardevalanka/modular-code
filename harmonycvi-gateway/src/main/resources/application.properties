spring.application.name=harmonycvi-gateway

server.port=9191
server.servlet.context-path=/gateway

spring.datasource.url=jdbc:postgresql://192.168.1.103:5432/dicom-latest?autoReconnect=true
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Hibernate / JPA
spring.jpa.properties.hibernate.default_schema=harmonycvi
spring.flyway.default-schema=harmonycvi
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# SQL logging — off in production; override in application-local.properties
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=2000

logging.level.org.springframework.orm.jpa=INFO
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.path=/var/log/myapp

spring.main.allow-circular-references=true

# File upload limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=1GB

# Connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.leak-detection-threshold=20000

# JWT
jwt.secret=${JWT_SECRET}
jwt.expirationMs=28800000

# DCM4CHEE — BaseUrl (/aets/DCM4CHEE/rs) is derived in code from this value
dcm4cheeBaseUrl=https://cvidev.techvedika.com/dcm4chee-arc

# AI services
ai.study-url=http://192.168.3.176:5021/
ai.ecv-study-url=http://192.168.3.176:5020/
# ai.max-idle-time default is 90000ms — uncomment to override
# ai.max-idle-time=90000

# Server / gateway URLs
server.gateway-url=http://localhost:9191

# Mail
mail.host=smtp.gmail.com
mail.port=465
mail.username=harmonycvi.ai@gmail.com
mail.password=${MAIL_PASSWORD}
mail.from=harmonycvi.ai@gmail.com

# Messaging (ActiveMQ / Artemis)
# Set messaging.activemq.enabled=true in the server environment to enable queuing.
# JmsConfig, AiQueueConsumer, and the JMS listener auto-startup all key off this one flag.
messaging.queue-name=ai_requests_queue
messaging.activemq.enabled=false
spring.jms.listener.auto-startup=${messaging.activemq.enabled:false}
spring.artemis.broker-url=tcp://192.168.1.103:61616
spring.artemis.user=admin
spring.artemis.password=${ARTEMIS_PASSWORD}

# Archiving — hour-of-day (default 21), minute-of-hour (0), duration (PT24H),
# study-life-time (30), max-studies (20), device-name (fs1) all have code defaults.
# Only add a line here to override a default.
# Base data directory — all storage paths are derived from this in code
app.data-dir=/opt/gateway/data

archiving.enabled=true
archiving.to-s3=true
archiving.s3-bucket=cvi-study-files-new

# Reports
report.to-s3=true
report.bucket-name=cvi-report-new

# Clinical uploads
upload.to-s3=true
upload.to-s3-deleted=false
upload.s3-bucket=cvi-study-upload-new
studyupload.bucket-name=cvi-study-upload-new

# Keycloak — all derived URLs are composed from base-url + realm
keycloak.server-url=http://192.168.1.103:8280/
keycloak.realm=dcm4che
keycloak.client-id=dcm4chee-arc-rs
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET}
keycloak.admin-user=admin
keycloak.enabled=false
keycloak.user-password=${KEYCLOAK_USER_PASSWORD}
keycloak.admin-password=${KEYCLOAK_ADMIN_PASSWORD}

# Organization config
organization.orgs.default.dicomDownloadUrl=https://cvidev.techvedika.com/dcm4chee-arc/aets/DCM4CHEE/rs

auth.google-client-id=${GOOGLE_CLIENT_ID}
org.default-id=655259
org.default-name=HarmonyCVI-Org
org.no-header-id=655259
org.header-footer-proportions={"655259":{"header_height":150,"footer_height":90}}

app.cors.allowed-origins=https://cvidev-viewer.techvedika.com/,https://cvi-viewer.techvedika.com/,https://cvidev.techvedika.com/,https://cvi.techvedika.com/,http://localhost:4200/,http://localhost:8080/
license.server.url=https://cvidev.techvedika.com
developers.emails=sruthi.kota@techvedika.com,sreedhar.puleti@techvedika.com

# Weasis — /weasis and /weasis-ext paths are appended in LaunchViewerServiceImpl
weasis.base-url=http://192.168.1.103:8084

# Active cloud provider: aws | gcp | azure
cloud.provider=aws

# GCP Cloud Run — ?action=status/stop/start query params appended in GcpAiServerController
gcp.cloudrun.base-url=https://vm-api-prod-statusvmapi-826422595216.asia-south1.run.app/

# AWS Lambda — /statusInstance /stopInstance /startInstance paths appended in AwsAiServerController
aws.lambda.base-url=https://grls3owj13.execute-api.ap-south-1.amazonaws.com/dev
aws.lambda.x-api-key=${AWS_LAMBDA_X_API_KEY}
aws.region=ap-south-1
aws.access-key-id=${AWS_ACCESS_KEY_ID}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY}

# Azure Functions
azure.functions.base-url=https://vmcontroller-ebcbg6hsf9e5e3fd.uaenorth-01.azurewebsites.net/api/vmcontroller
azure.functions.api-key=${AZURE_FUNCTIONS_API_KEY}
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING}
